<div class="login-wrapper">
  <div class="login-card">

    <div class="login-body">

      @if (erro()) {
        <div class="erro-msg" role="alert">
          <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v5M10 14h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          {{ erro() }}
        </div>
      }

      <div class="campo-grupo">
        <label class="campo-label" for="email">Usuário</label>
        <div class="campo-wrapper">
          <svg class="campo-icone" viewBox="0 0 20 20" fill="none">
            <path d="M2.5 6.5l7.5 5 7.5-5M3 5h14a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V6a1 1 0 011-1z"
              stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input
            id="usuario"
            class="campo-input"
            type="text"
            placeholder="Usuario"
            [ngModel]="usuario()"
            (ngModelChange)="usuario.set($event)"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="campo-grupo">
        <label class="campo-label" for="senha">Senha</label>
        <div class="campo-wrapper">
          <svg class="campo-icone" viewBox="0 0 20 20" fill="none">
            <rect x="4" y="9" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input
            id="senha"
            class="campo-input"
            [type]="senhaVisivel() ? 'text' : 'password'"
            placeholder="••••••••"
            [ngModel]="senha()"
            (ngModelChange)="senha.set($event)"
            autocomplete="current-password"
          />
          <button class="btn-toggle-senha" type="button" (click)="alternarSenha()" [attr.aria-label]="senhaVisivel() ? 'Ocultar senha' : 'Mostrar senha'">
            @if (senhaVisivel()) {
              <svg viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 3l14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            } @else {
              <svg viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>
            }
          </button>
        </div>
      </div>

      <button
        class="btn-acessar"
        [class.carregando]="carregando()"
        [disabled]="carregando()"
        (click)="acessar()"
        type="button"
      >
        @if (carregando()) {
          <span class="spinner"></span>
          <span>Entrando...</span>
        } @else {
          <span>Acessar</span>
        }
      </button>

    </div>

  </div>
</div>
